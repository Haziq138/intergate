<!DOCTYPE html>
<html>
    <head>
        <title>Contact Details </title>
        <link rel="stylesheet" href="contactdetails.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    </head>

    <body>
    <div class="container">
         <div class="left-image">
            <img src="hotel1.jpg" alt="Hotel" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="right-form">
        
            <div class="form-card">
                 <i class='fas fa-address-card' style='font-size:36px; color:white;'></i>
            <h2 style="font-family: 'Times New Roman', Times, serif; size: 70%;">Contact Details</h2>
            <p class="subtitle">Please fill in your contact information</p>

            <div id="messageArea" class="message-area"></div>

            <form id="contactForm">
                <div class="input-group">
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <input type="tel" id="phone" placeholder="Enter your phone number">
                </div>

                <div class="input-group">
                    <input type="email" id="email" placeholder="Enter your email address">
                </div>

                <button type="submit"> Save Changes </button>        </form>
            <div class="link-group">
                <a href="profile.html"> Back to Profile </a>
            </div>
        </div>

        <script>

    function saveContact() {
        var name = document.getElementById('name').value;
        var phone = document.getElementById('phone').value;
        var email = document.getElementById('email').value;
        var message = document.getElementById('messageArea');
        
        if (name === "" || phone === "" || email === "") {
            message.style.display = "block";
            message.innerHTML = "Please fill in all fields";
            message.style.backgroundColor = "red";
            message.style.color = "white";
          } else {
            message.style.display = "block";
            message.innerHTML = "Saved successfully!";
            message.style.backgroundColor = "green";
            message.style.color = "white";
        }
    }

</script>
    <script type="module" src="js/contact-details.js"></script>
    </body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <link rel="stylesheet" href="change-password.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<div class="container">
    <h2><i class="fas fa-key"></i> Change Password</h2>

    <input type="password" id="currentPassword" placeholder="Old Password">
    <input type="password" id="newPassword" placeholder="New Password">
    <input type="password" id="confirmPassword" placeholder="Confirm New Password">

    <button id="changePasswordBtn">Update Password</button>

    <br><br>
    <a href="profile.html" style="color:white; text-decoration:underline;">Back to Profile</a>
</div>

<script type="module" src="js/change-password.js"></script>

</body>
</html>

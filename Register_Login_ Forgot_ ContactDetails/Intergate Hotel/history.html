<!DOCTYPE html>
<html>
<head>
    <title>History Page</title>
    <link rel="stylesheet" href="history.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>

<div class="navbar">
    <div class="menu-icon" onclick="openSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <a href="home.html" class="hotel-logo">Intergate Hotel</a>

    <a href="#" id="logoutBtn" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</div>

<div id="sidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeSidebar()">&times;</a>
    <a href="home.html#homeSection">Home</a>
    <a href="home.html#roomsSection">Rooms</a>
    <a href="home.html#facilitiesSection">Facilities</a>
    <a href="home.html#locationSection">Location</a>
    <a href="history.html">Booking History</a>
    <a href="profile.html">Profile</a>
</div>

<div class="container">
    <div class="paper">
        <h2><i class="fas fa-clock"></i> Booking History</h2>
        <div class="form-sub">View all your past/upcoming bookings</div>

        <div id="bookingHistoryContainer" class="booking-list">
            <div class="empty-state">
                <i class="fas fa-calendar-alt"></i>
                <p>No bookings found!</p>
                <a href="booking.html" class="book-now-btn">Book Now</a>
            </div>
        </div>
    </div>
</div>

<script>
    function openSidebar() {
        document.getElementById("sidebar").style.width = "250px";
    }

    function closeSidebar() {
        document.getElementById("sidebar").style.width = "0";
    }
</script>

<script type="module" src="js/history.js"></script>
<script src="js/logout.js"></script>

</body>
</html>

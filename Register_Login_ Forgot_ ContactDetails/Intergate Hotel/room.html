<!DOCTYPE html>
<html>
<head>
    <title>Room - Intergate Hotel</title>
    <link rel="stylesheet" href="room.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="menu-icon" onclick="openSidebar()">
            <i class="fas fa-bars"></i>
        </div>

        <a href="home.html" class="hotel-logo">Intergate Hotel</a>

        <a href="#" id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <!-- SIDEBAR -->
<div id="sidebar" class="sidebar" style="background-color: maroon;">
    <a href="javascript:void(0)" class="closebtn" onclick="closeSidebar()">&times;</a>
    <a href="home.html#homeSection">Home</a>
    <a href="home.html#roomsSection">Rooms</a>
    <a href="home.html#facilitiesSection">Facilities</a>
    <a href="home.html#locationSection">Location</a>
    <a href="history.html">Booking History</a>
    <a href="profile.html">Profile</a>
</div>

    <!-- ROOM DETAILS -->
    <div class="container">
        <div id="roomDetailsContainer">
            <!-- Room details from Firestore will appear here -->
        </div>
    </div>

    <script>
        function openSidebar() {
            document.getElementById("sidebar").style.width = "250px";
        }

        function closeSidebar() {
            document.getElementById("sidebar").style.width = "0";
        }
    </script>

    <script type="module" src="js/room.js"></script>
    <script src="js/logout.js"></script>

</body>
</html>

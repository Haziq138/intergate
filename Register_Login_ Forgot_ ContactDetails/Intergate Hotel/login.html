<!DOCTYPE html>
<html>
<head>
    <title>Login page</title>

    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>

    <div class="left-image">
        <img src="hotel2.jpg" alt="Hotel" style="width: 100%; height: 100%; object-fit: cover;">
    </div>

    <div class="right-form">
        <div class="paper">

            <i class="fas fa-user-circle" style="font-size:48px; color:white;"></i>
            <br><br>

            <form id="loginForm" style="text-align:center; color:white;">

                <input type="email" id="loginEmail" placeholder="Enter your Email">
                <br>

                <input type="password" id="loginPassword" placeholder="Enter your Password">
                <br><br>

                <button type="submit" style="text-align: center;">Login</button>
                <br><br>

                <a href="Forgotpass.html" style="text-align: center; color:aliceblue;">Forgot password</a>
                <br>

                <a href="register.html" style="text-align: center; color:aliceblue;">Register now!</a>

            </form>

        </div>

        <div style="text-align: left; margin-top: 10px; margin-left: 50px;">
            <a href="register.html">
                <i class="fa fa-arrow-circle-left" style="font-size:24px; color:maroon"></i>
            </a>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>

</body>
</html>

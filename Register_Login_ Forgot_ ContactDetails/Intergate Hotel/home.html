<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="menu-icon" onclick="openSidebar()">
            <i class="fas fa-bars"></i>
        </div>

        <a href="home.html" class="hotel-logo">Intergate Hotel</a>

        <a href="#" id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar" style="background-color: maroon;">
        <a href="javascript:void(0)" class="closebtn" onclick="closeSidebar()">&times;</a>
        <a href="home.html#homeSection">Home</a>
        <a href="home.html#roomsSection">Rooms</a>
        <a href="home.html#facilitiesSection">Facilities</a>
        <a href="home.html#locationSection">Location</a>
        <a href="history.html">Booking History</a>
        <a href="profile.html">Profile</a>
    </div>

    <div class="container">

        <!-- HOME SECTION -->
        <div class="home-section" id="homeSection">

            <h1>Welcome to Intergate Hotel</h1>
            <p>Find your ideal room and enjoy our facilities.</p>

            <div class="slideshow-container">
                <img id="slideImage" src="hotel1.jpg" alt="Hotel Image">
            </div>

            <br>

            <button type="button" onclick="window.location.href='#roomsSection'">
                View Rooms
            </button>

        </div>

        <!-- ROOM SECTION -->
        <h2 id="roomsSection" style="text-align:center; color:maroon; margin-top:40px;">
            Available Rooms
        </h2>

        <div class="search-bar">

            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search by room name.." 
                style="font-family:'Times New Roman', Times, serif;"
            >

            <select id="filterSelect" style="font-family:'Times New Roman', Times, serif;">
                <option value="all">All Rooms</option>
                <option value="standard">Standard</option>
                <option value="deluxe">Deluxe</option>
                <option value="family">Family</option>
                <option value="suite">Suite</option>
            </select>

            <select id="availabilitySelect" style="font-family:'Times New Roman', Times, serif;">
                <option value="all">All Status</option>
                <option value="available">Available</option>
                <option value="unavailable">Unavailable</option>
                <option value="occupied">Occupied</option>
                <option value="on maintenance">On Maintenance</option>
            </select>

            <button type="button" onclick="filterRooms()">Search</button>

        </div>

        <div class="card-container" id="roomContainer">
            <!-- Room data from Firestore will appear here -->
        </div>

<!-- FACILITIES SECTION -->
<h2 id="facilitiesSection" style="text-align:center; color:maroon; margin-top:40px;">
    Service Available
</h2>

<div class="services-container" id="facilityContainer">
    <!-- Facility data from Firestore will appear here -->
</div>


<!-- LOCATION SECTION -->
<h2 id="locationSection" style="text-align:center; color:maroon; margin-top:40px;">
    Hotel Location
</h2>

<div class="location-container" id="locationContainer">
    <div class="location-card">

        <p>
            Find our hotel location easily using the map below.
        </p>

        <div class="map-box">
            <!-- Google Maps embed will appear here -->
            <iframe
src="//www.google.com/maps/embed?pb=!1m26!1m12!1m3!1d37184555.9815466!2d94.14932898420834!3d19.067320491220347!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m11!3e0!4m3!3m2!1d3.0645457!2d101.7381855!4m5!1s0x6000e7d8ca57be0f%3A0xce60d22fbb7cef61!2sHotel%20Intergate%20Osaka%20Umeda%2C%202%20Chome-5-2%20Umeda%2C%20Kita%20Ward%2C%20Osaka%2C%20530-0001%2C%20Japan!3m2!1d34.6981353!2d135.493225!5e0!3m2!1sen!2smy!4v1779984443505!5m2!1sen!2smy"
                width="100%"
                height="350"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>
    </div>
</div>

    <!-- SIDEBAR AND SLIDESHOW SCRIPT -->
    <script>
        function openSidebar() {
            document.getElementById("sidebar").style.width = "250px";
        }

        function closeSidebar() {
            document.getElementById("sidebar").style.width = "0";
        }

        var slideImages = ["hotel1.jpg", "hotel2.jpg", "hotel3.jpg", "hotel4.jpg"];
        var currentSlide = 0;

        setInterval(function() {
            currentSlide++;

            if (currentSlide >= slideImages.length) {
                currentSlide = 0;
            }

            document.getElementById("slideImage").src = slideImages[currentSlide];
        }, 3000);
    </script>

    <script type="module" src="js/home.js"></script>
    <script src="js/logout.js"></script>
    <script>
    window.addEventListener("load", function() {
        if (window.location.hash) {
            const section = document.querySelector(window.location.hash);

            if (section) {
                setTimeout(function() {
                    section.scrollIntoView({ behavior: "smooth" });
                }, 300);
            }
        }
    });
</script>
</body>
</html>

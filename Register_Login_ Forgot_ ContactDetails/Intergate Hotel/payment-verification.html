<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Verification</title>

    <link rel="stylesheet" href="staff.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>

    <div class="sidebar">
        <h2>Intergate Hotel</h2>
        <p class="panel-title">Staff Panel</p>

        <a href="staff-dashboard.html">
            <i class="fas fa-home"></i> Dashboard
        </a>

        <a href="booking-approval.html">
            <i class="fas fa-list"></i> Booking List
        </a>

        <a href="payment-verification.html" class="active">
            <i class="fas fa-credit-card"></i> Payment Verification
        </a>

        <a href="js/login.js" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <div class="main">

        <div class="page-title">
            <h1>Payment Verification</h1>
            <p>View payment records, check payment proof, and update payment status.</p>
        </div>

<div class="filter-box">
    <input type="text" id="paymentSearchInput" placeholder="Search by payment ID, booking ID, or customer">

    <button type="button" id="paymentSearchBtn" class="search-btn">
        <i class="fas fa-search"></i> Search
    </button>

    <select id="paymentStatusFilter">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="paid">Paid</option>
        <option value="rejected">Rejected</option>
        <option value="unpaid">Unpaid</option>
    </select>
</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Payment ID</th>
                        <th>Booking ID</th>
                        <th>Customer</th>
                        <th>Method</th>
                        <th>Proof</th>
                        <th>Payment Status</th>
                        <th>Update Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="paymentListContainer">
                    <tr>
                        <td colspan="8" class="empty-row">Loading payment records...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script type="module" src="js/payment-verification.js"></script>
    <script src="js/logout.js"></script>

</body>
</html>

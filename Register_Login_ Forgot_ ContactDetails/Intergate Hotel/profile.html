     <br><br><br><br><br>

        <body>
           <div class="paper">
           <div class="profile-header">
               <i class='fas fa-user-circle' style='font-size:48px;color:maroon'></i><br><br>

               <h1> user profile </h1>
          <div class="profile-info">
          <div class="info-row">
            <i class="fas fa-user"></i>
            <span class="label">Name: </span>
            <span class="value" id="profileName">-</span>
          </div>

          <div class="info-row">
            <i class="fas fa-envelope"></i>
            <span class="label">Email :</span>
            <span class="value" id="profileEmail">-</span>
          </div>

          <div class="info-row">
            <i class="fas fa-phone"></i>
            <span class="label">Phone:</span>
            <span class="value" id="profilePhone">-</span>
          </div>

          <br><br>

        <div class="profile-button">
            <button type="button" class="edit-btn" onclick="window.location.href='contactdetails.html'">Edit Profile</button>
            <button type="button" class="password-btn" onclick="window.location.href='change-password.html'">Change Password</button>
        </div>       
               
               </div>
          </div>
          <script type="module" src="js/profile.js"></script>

        </body>
